<!doctype html>
<html lang="{{ lang }}">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}?{{ sri['main.css']|urlencode }}" integrity="{{ sri['main.css'] }}" />
</head>

<body>
  <nav class="lang-switcher" aria-label="{{ t('lang.switcher_label') }}">
{%- for code in supported_langs %}
{%- if code == lang %}
    <span class="lang-current" aria-current="true">{{ code|upper }}</span>
{%- else %}
    <a href="{{ url_for('website.index', lang=code) }}" hreflang="{{ code }}" lang="{{ code }}">{{ code|upper }}</a>
{%- endif %}
{%- if not loop.last %}
    <span class="lang-sep" aria-hidden="true">|</span>
{%- endif %}
{%- endfor %}
  </nav>
  <div id="content">{% block content %}{% endblock %}
  </div>
</body>
</html>
